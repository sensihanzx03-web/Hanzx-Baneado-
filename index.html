<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fake Ninja Lite - Key System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #09090e;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            background: rgba(20, 20, 35, 0.7);
            padding: 2.5rem;
            border-radius: 12px;
            border: 1px solid rgba(255, 0, 127, 0.2);
            box-shadow: 0 0 25px rgba(255, 0, 127, 0.15);
            width: 100%;
            max-width: 440px;
            text-align: center;
        }

        h1 {
            font-size: 1.6rem;
            margin-bottom: 1.5rem;
            color: #ff007f;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .status-box {
            background: rgba(0, 0, 0, 0.4);
            padding: 1rem;
            border-radius: 6px;
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
            border-left: 4px solid #ff007f;
        }

        .btn {
            background: linear-gradient(45deg, #ff007f, #7f00ff);
            color: #ffffff;
            font-weight: bold;
            border: none;
            padding: 1rem 2rem;
            font-size: 1rem;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(255, 0, 127, 0.3);
        }

        .btn:hover {
            filter: brightness(1.2);
            box-shadow: 0 6px 20px rgba(255, 0, 127, 0.5);
        }

        .btn:disabled {
            background: #222;
            color: #666;
            cursor: not-allowed;
            box-shadow: none;
        }

        .key-box {
            display: none;
            margin-top: 1.5rem;
            background: rgba(255, 0, 127, 0.05);
            border: 1px dashed #ff007f;
            padding: 1rem;
            border-radius: 6px;
        }

        .key-text {
            font-family: monospace;
            font-size: 1.2rem;
            color: #ff007f;
            word-break: break-all;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }

        .copy-btn {
            background: transparent;
            border: 1px solid #ff007f;
            color: #ff007f;
            padding: 0.4rem 1.2rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            background: #ff007f;
            color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Fake Ninja Lite</h1>
        
        <div id="status" class="status-box">
            Presiona el botón para verificar tu sesión y reclamar tu clave Lite.
        </div>

        <button id="actionBtn" class="btn" onclick="generateLiteKey()">Obtener Clave Lite</button>

        <div id="keyContainer" class="key-box">
            <!-- Texto inicial corregido a 4 espacios -->
            <div id="keyDisplay" class="key-text">FAKE-NINJA-LITE-XXXX</div>
            <button class="copy-btn" onclick="copyKey()">Copiar Clave</button>
        </div>
    </div>

    <script>
        function generateLiteKey() {
            const statusBox = document.getElementById('status');
            const actionBtn = document.getElementById('actionBtn');
            const keyContainer = document.getElementById('keyContainer');

            actionBtn.disabled = true;
            statusBox.innerHTML = "Autenticando credenciales Lite...";

            setTimeout(() => {
                statusBox.innerHTML = "Generando hash de acceso único...";
                
                setTimeout(() => {
                    statusBox.innerHTML = "¡Clave Lite lista para usar!";
                    
                    // Modificado estrictamente para generar solo 4 caracteres aleatorios
                    let randomSequence = '';
                    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
                    for (let i = 0; i < 4; i++) {
                        randomSequence += chars.charAt(Math.floor(Math.random() * chars.length));
                    }
                    
                    const finalKey = `FAKE-NINJA-LITE-${randomSequence}`;
                    
                    document.getElementById('keyDisplay').innerText = finalKey;
                    keyContainer.style.display = "block";
                    actionBtn.style.display = "none";
                }, 1500);

            }, 1500);
        }

        function copyKey() {
            const keyText = document.getElementById('keyDisplay').innerText;
            navigator.clipboard.writeText(keyText).then(() => {
                alert("¡Clave Lite copiada con éxito!");
            });
        }
    </script>
</body>
</html>
