<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FN Key System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #0f0c20;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            padding: 2.5rem;
            border-radius: 16px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            color: #00ffcc;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .status-box {
            background: rgba(0, 0, 0, 0.3);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 1rem;
            border-left: 4px solid #00ffcc;
        }

        .btn {
            background: linear-gradient(45deg, #00ffcc, #0077ff);
            color: #000;
            font-weight: bold;
            border: none;
            padding: 1rem 2rem;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s, filter 0.2s;
            text-transform: uppercase;
        }

        .btn:hover {
            filter: brightness(1.2);
            transform: translateY(-2px);
        }

        .btn:disabled {
            background: #444;
            color: #888;
            cursor: not-allowed;
            transform: none;
            filter: none;
        }

        .key-box {
            display: none;
            margin-top: 1.5rem;
            background: rgba(0, 255, 204, 0.1);
            border: 1px dashed #00ffcc;
            padding: 1rem;
            border-radius: 8px;
            position: relative;
        }

        .key-text {
            font-family: monospace;
            font-size: 1.1rem;
            color: #00ffcc;
            word-break: break-all;
        }

        .copy-btn {
            margin-top: 0.5rem;
            background: transparent;
            border: 1px solid #00ffcc;
            color: #00ffcc;
            padding: 0.3rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .copy-btn:hover {
            background: #00ffcc;
            color: #000;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>FN Key System</h1>
        
        <div id="status" class="status-box">
            Presiona el botón para verificar y generar tu clave.
        </div>

        <button id="actionBtn" class="btn" onclick="startProcess()">Obtener Clave</button>

        <div id="keyContainer" class="key-box">
            <div id="keyDisplay" class="key-text">Cargando...</div>
            <button class="copy-btn" onclick="copyKey()">Copiar Clave</button>
        </div>
    </div>

    <script>
        // Función para generar bloques aleatorios de letras y números
        function makeBlock(length) {
            let result = '';
            const characters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            const charactersLength = characters.length;
            for (let i = 0; i < length; i++) {
                result += characters.charAt(Math.floor(Math.random() * charactersLength));
            }
            return result;
        }

        function startProcess() {
            const statusBox = document.getElementById('status');
            const actionBtn = document.getElementById('actionBtn');
            const keyContainer = document.getElementById('keyContainer');

            actionBtn.disabled = true;
            statusBox.innerHTML = "Verificando sistema... Por favor espera.";

            setTimeout(() => {
                statusBox.innerHTML = "Generando tu clave única de acceso...";
                
                setTimeout(() => {
                    statusBox.innerHTML = "¡Clave generada con éxito!";
                    
                    // Genera los dos bloques aleatorios de 5 dígitos cada uno
                    const block1 = makeBlock(5);
                    const block2 = makeBlock(5);
                    
                    // Une todo con el prefijo solicitado
                    const generatedKey = `FAKE-NINJA-${block1}-${block2}`;
                    
                    document.getElementById('keyDisplay').innerText = generatedKey;
                    keyContainer.style.display = "block";
                    actionBtn.style.display = "none";
                }, 2000);

            }, 2000);
        }

        function copyKey() {
            const keyText = document.getElementById('keyDisplay').innerText;
            navigator.clipboard.writeText(keyText).then(() => {
                alert("¡Clave copiada al portapapeles!");
            });
        }
    </script>
</body>
</html>
